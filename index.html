<script>
function updateTime() {
    const now = new Date();
    let hours = now.getHours();
    let minutes = now.getMinutes();
    let seconds = now.getSeconds();

    // Add a leading zero to numbers less than 10 (e.g., 05 instead of 5)
    hours = hours < 10 ? '0' + hours : hours;
    minutes = minutes < 10 ? '0' + minutes : minutes;
    seconds = seconds < 10 ? '0' + seconds : seconds;

    // Format the time string
    const timeString = `${hours}:${minutes}:${seconds}`;
    
    // Update the HTML element
    document.getElementById('digitalClock').innerText = timeString;
}

// Call updateTime every 1000ms (1 second)
setInterval(updateTime, 1000);

// Run immediately on page load
updateTime();
</script>
<script>
let startTime, timerInterval;
let elapsedTime = 0;

function start() {
  startTime = Date.now() - elapsedTime;
  timerInterval = setInterval(function updateDisplay() {
    elapsedTime = Date.now() - startTime;
    document.getElementById("display").innerHTML = formatTime(elapsedTime);
  }, 10);
}

function stop() {
  clearInterval(timerInterval);
}

function reset() {
  clearInterval(timerInterval);
  elapsedTime = 0;
  document.getElementById("display").innerHTML = "00:00:00";
}

// Function to format milliseconds into HH:MM:SS
function formatTime(ms) {
  let date = new Date(ms);
  return date.toISOString().substr(11, 8);
}

// Attach functions to buttons
document.getElementById("startBtn").addEventListener("click", start);
document.getElementById("stopBtn").addEventListener("click", stop);
document.getElementById("resetBtn").addEventListener("click", reset);
</script>
<script>
function savePage() {
    // 1. Get the entire HTML content of the page
    const htmlContent = document.documentElement.outerHTML;

    // 2. Create a Blob (Binary Large Object) containing the HTML
    const blob = new Blob([htmlContent], { type: 'text/html' });

    // 3. Create a temporary link element to trigger the download
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'my-web-page.html'; // Set the default filename

    // 4. Trigger the download and clean up
    link.click();
    URL.revokeObjectURL(link.href);
}
</script>
